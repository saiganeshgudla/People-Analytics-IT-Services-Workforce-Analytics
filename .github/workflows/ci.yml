name: PeopleLens CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Lint & Format Check ─────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install lint tools
        run: pip install ruff black

      - name: Run ruff (linter)
        run: ruff check . --select E,F,I,N --ignore E501

      - name: Run black (formatter check)
        run: black --check --line-length 100 .

  # ── Unit & Integration Tests ────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create required directories
        run: |
          mkdir -p data/synthetic data/analytics data/processed data/staging data/exports
          mkdir -p models logs

      - name: Run tests (no DB required)
        run: |
          pytest tests/test_models.py tests/test_api.py -v \
            --cov=analytics --cov=data_generator \
            --cov-report=term-missing \
            --cov-report=xml \
            -x

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ── Data Generation Smoke Test ──────────────────────────────────────────────
  data-smoke-test:
    name: Data Generator Smoke Test
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install pandas numpy faker python-dotenv

      - name: Generate small dataset (smoke test)
        run: python data_generator/generate_dataset.py --employees 500

      - name: Verify output files exist
        run: |
          test -f data/synthetic/employees.csv      && echo "✅ employees.csv"
          test -f data/synthetic/salary_history.csv && echo "✅ salary_history.csv"
          test -f data/synthetic/performance.csv    && echo "✅ performance.csv"
          test -f data/synthetic/exits.csv          && echo "✅ exits.csv"
          test -f data/synthetic/managers.csv       && echo "✅ managers.csv"
