peoplelens:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      user: "{{ env_var('POSTGRES_USER', 'peoplelens_user') }}"
      password: "{{ env_var('POSTGRES_PASSWORD') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'peoplelens') }}"
      schema: staging
      threads: 4
    prod:
      type: postgres
      host: "{{ env_var('PROD_POSTGRES_HOST') }}"
      port: "{{ env_var('PROD_POSTGRES_PORT', '5432') | int }}"
      user: "{{ env_var('PROD_POSTGRES_USER') }}"
      password: "{{ env_var('PROD_POSTGRES_PASSWORD') }}"
      dbname: "{{ env_var('PROD_POSTGRES_DB', 'peoplelens') }}"
      schema: staging
      threads: 4
