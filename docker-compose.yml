version: "3.9"

services:
  # ── PostgreSQL Data Warehouse ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: peoplelens_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-peoplelens}
      POSTGRES_USER: ${POSTGRES_USER:-peoplelens_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-peoplelens_dev_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-peoplelens_user} -d ${POSTGRES_DB:-peoplelens}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - peoplelens_net

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: peoplelens_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-peoplelens_user}:${POSTGRES_PASSWORD:-peoplelens_dev_pass}@postgres:5432/${POSTGRES_DB:-peoplelens}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    networks:
      - peoplelens_net

  # ── Streamlit Dashboard ────────────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      target: dashboard
    container_name: peoplelens_dashboard
    restart: unless-stopped
    env_file: .env
    environment:
      API_BASE_URL: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      - api
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    networks:
      - peoplelens_net

volumes:
  postgres_data:
    driver: local

networks:
  peoplelens_net:
    driver: bridge
